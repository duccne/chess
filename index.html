<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Chị Yêu ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="gift-screen">
        <div class="gift-box" onclick="goToAuth()">
            <div class="gift-bow"></div>
            <div class="gift-lid"></div>
            <div class="gift-body"></div>
        </div>
        <p class="hint">Bấm vào hộp quà để khám phá bí mật... 🎁</p>
    </div>

    <div id="auth-screen" class="hidden">
        <div class="auth-box">
            <h3>Mật mã yêu thương</h3>
            <input type="password" id="password-input" placeholder="Nhập mã vào đây chị nhé...">
            <button onclick="checkUnlock()">Mở Quà</button>
            <p id="error-msg" class="hidden">Mã này chưa đúng rồi! 😜</p>
        </div>
    </div>

    <div id="final-screen" class="hidden">
        <div class="main-content">
            <h1 class="main-title">HAPPY BIRTHDAY CHỊ YÊU! 🎂</h1>
            <p class="sub-title">Chúc chị luôn rực rỡ và hạnh phúc bên em!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
