<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cờ Vua AI & 3D Web</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-wood">

    <h2>Cờ Vua Đánh Với Máy (AI)</h2>
    
    <div class="controls">
        <select id="difficulty">
            <option value="1">Độ khó: Tập sự (Dễ)</option>
            <option value="5" selected>Độ khó: Nghiệp dư (Vừa)</option>
            <option value="10">Độ khó: Chuyên nghiệp (Khó)</option>
            <option value="15">Độ khó: Kiện tướng (Rất Khó)</option>
        </select>

        <select id="theme">
            <option value="theme-wood">Bàn cờ: Gỗ truyền thống</option>
            <option value="theme-blue">Bàn cờ: Xanh Bạc hiện đại</option>
        </select>

        <button id="toggle-3d">Bật/Tắt Góc Nhìn 3D</button>
        <button id="reset-btn">Chơi Lại</button>
    </div>
    
    <div id="board-container">
        <div id="board" class="mode-3d"></div>
    </div>
    
    <div id="status">Lượt của bạn (Trắng)</div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
